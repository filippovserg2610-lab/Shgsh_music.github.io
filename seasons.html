<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Сезоны</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="telegram-app">
        <!-- Шапка как в Telegram -->
        <div class="tg-header">
            <button class="tg-back-btn" onclick="window.location.href='index.html'">‹</button>
            <div class="tg-header-title">🎵 Архив ШГШ</div>
            <div style="width: 40px;"></div>
        </div>

        <!-- Сообщение-подсказка -->
        <div class="tg-content">
            <div class="tg-message">
                <div class="tg-message-text">
                    👇 <strong>Выбери сезон или раздел:</strong>
                </div>
            </div>

            <!-- Inline-кнопки как в Telegram -->
            <div class="tg-inline-grid" id="seasonsGrid">
                <!-- Кнопки будут вставлены из JS -->
            </div>

            <!-- Каналы как отдельная inline-кнопка -->
            <div class="tg-inline-grid" style="margin-top: 8px;">
                <button class="tg-inline-btn tg-inline-btn-wide" onclick="window.location.href='channels.html'">
                    📢 официальные каналы
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const seasonsGrid = document.getElementById('seasonsGrid');

        const seasonEntries = [
            { id: '8', emoji: '🎸', name: '8 СЕЗОН' },
            { id: '7', emoji: '🥁', name: '7 СЕЗОН' },
            { id: '6', emoji: '🎹', name: '6 СЕЗОН' },
            { id: '5', emoji: '🎧', name: '5 СЕЗОН' },
            { id: '4', emoji: '📻', name: '4 СЕЗОН' },
            { id: '3', emoji: '⏳', name: '3 СЕЗОН' },
            { id: '2', emoji: '⏳', name: '2 СЕЗОН' },
            { id: '1', emoji: '⏳', name: '1 СЕЗОН' },
            { id: '0', emoji: '🎙️', name: 'РЕМИКСЫ' },
            { id: 'temp', emoji: '🔄', name: 'ВРЕМЕННЫЕ ОРИГИНАЛЫ' }
        ];

        seasonEntries.forEach(season => {
            const btn = document.createElement('button');
            btn.className = 'tg-inline-btn';
            btn.textContent = `${season.emoji} ${season.name}`;
            btn.onclick = () => {
                window.location.href = `playlist.html?season=${season.id}`;
            };
            seasonsGrid.appendChild(btn);
        });
    </script>
</body>
</html>
