<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Выбор сезона</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="page">
        <h1>🎵 МУЗЫКАЛЬНЫЙ АРХИВ ШГШ</h1>
        <p class="subtitle">👇 Выбери сезон или раздел:</p>

        <div class="seasons-grid" id="seasonsGrid">
            <!-- Сезоны будут вставлены из JS -->
        </div>

        <div class="bottom-links">
            <button class="btn-channels" onclick="window.location.href='channels.html'">📢 официальные каналы</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const seasonsGrid = document.getElementById('seasonsGrid');

        // Данные из data.js
        const seasonEntries = [
            { id: '8', emoji: '🎸', name: '8 СЕЗОН' },
            { id: '7', emoji: '🥁', name: '7 СЕЗОН' },
            { id: '6', emoji: '🎹', name: '6 СЕЗОН' },
            { id: '5', emoji: '🎧', name: '5 СЕЗОН' },
            { id: '4', emoji: '📻', name: '4 СЕЗОН' },
            { id: '3', emoji: '⏳', name: '3 СЕЗОН' },
            { id: '2', emoji: '⏳', name: '2 СЕЗОН' },
            { id: '1', emoji: '⏳', name: '1 СЕЗОН' },
            { id: '0', emoji: '🎙️', name: 'РЕМИКСЫ' },
            { id: 'temp', emoji: '🔄', name: 'ВРЕМЕННЫЕ ОРИГИНАЛЫ' }
        ];

        seasonEntries.forEach(season => {
            const btn = document.createElement('button');
            btn.className = 'season-btn';
            btn.innerHTML = `${season.emoji} ${season.name}`;
            btn.onclick = () => {
                window.location.href = `playlist.html?season=${season.id}`;
            };
            seasonsGrid.appendChild(btn);
        });
    </script>
</body>
</html>
