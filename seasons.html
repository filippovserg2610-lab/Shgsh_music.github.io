<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Сезоны</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="telegram-app" id="app">
        <!-- Цветные кружочки -->
        <div class="color-dots-left">
            <div class="color-dot" data-color="white" style="background: #ffffff;" onclick="changeTheme('white')"></div>
            <div class="color-dot" data-color="red" style="background: #ff4444;" onclick="changeTheme('red')"></div>
            <div class="color-dot" data-color="yellow" style="background: #ffdd00;" onclick="changeTheme('yellow')"></div>
            <div class="color-dot" data-color="purple" style="background: #9b59b6;" onclick="changeTheme('purple')"></div>
        </div>
        <div class="color-dots-right">
            <div class="color-dot" data-color="black" style="background: #222222;" onclick="changeTheme('black')"></div>
            <div class="color-dot" data-color="green" style="background: #2ecc71;" onclick="changeTheme('green')"></div>
            <div class="color-dot" data-color="blue" style="background: #3498db;" onclick="changeTheme('blue')"></div>
            <div class="color-dot" data-color="orange" style="background: #e67e22;" onclick="changeTheme('orange')"></div>
        </div>

        <!-- Шапка -->
        <div class="tg-header">
            <button class="tg-back-btn" data-comet href="index.html">‹</button>
            <div class="tg-header-title">Архив ШГШ</div>
            <div style="width: 40px;"></div>
        </div>

        <!-- Контент -->
        <div class="tg-content">
            <div class="tg-message">
                <div class="tg-message-text">👇 <strong>Выбери сезон или раздел:</strong></div>
            </div>

            <div class="tg-inline-grid" id="seasonsGrid">
                <!-- 8 СЕЗОН — ОГОНЬ -->
                <button class="tg-inline-btn season-fire" data-transition href="playlist.html?season=8">🎸 8 СЕЗОН</button>
                <!-- 7 СЕЗОН — ВЕТЕР -->
                <button class="tg-inline-btn season-wind" data-transition href="playlist.html?season=7">🥁 7 СЕЗОН</button>
                <!-- 6 СЕЗОН — ВРАЩЕНИЕ -->
                <button class="tg-inline-btn season-spin" data-transition href="playlist.html?season=6">🎹 6 СЕЗОН</button>
                <!-- 5 СЕЗОН — ДРОЖЬ -->
                <button class="tg-inline-btn season-shake" data-transition href="playlist.html?season=5">🎧 5 СЕЗОН</button>
                <!-- 4 СЕЗОН — МЕРЦАНИЕ -->
                <button class="tg-inline-btn season-flicker" data-transition href="playlist.html?season=4">📻 4 СЕЗОН</button>
                <!-- 3 СЕЗОН -->
                <button class="tg-inline-btn" data-transition href="playlist.html?season=3">⏳ 3 СЕЗОН</button>
                <!-- 2 СЕЗОН -->
                <button class="tg-inline-btn" data-transition href="playlist.html?season=2">⏳ 2 СЕЗОН</button>
                <!-- 1 СЕЗОН -->
                <button class="tg-inline-btn" data-transition href="playlist.html?season=1">⏳ 1 СЕЗОН</button>
                <!-- 0 СЕЗОН -->
                <button class="tg-inline-btn" data-transition href="playlist.html?season=0">🎙️ РЕМИКСЫ</button>
                <!-- ВРЕМЕННЫЕ -->
                <button class="tg-inline-btn" data-transition href="playlist.html?season=temp">🔄 ВРЕМЕННЫЕ ОРИГИНАЛЫ</button>
                <!-- КАНАЛЫ -->
                <button class="tg-inline-btn tg-inline-btn-wide" data-transition href="channels.html">📢 официальные каналы</button>
            </div>
        </div>

        <!-- Деревья и ветер -->
        <div class="trees-container">
            <div class="tree tree-1"><div class="tree-trunk"></div><div class="tree-crown"></div></div>
            <div class="tree tree-2"><div class="tree-trunk"></div><div class="tree-crown"></div></div>
            <div class="tree tree-3"><div class="tree-trunk"></div><div class="tree-crown"></div></div>
            <div class="tree tree-4"><div class="tree-trunk"></div><div class="tree-crown"></div></div>
            <div class="wind-line wind-1"></div>
            <div class="wind-line wind-2"></div>
            <div class="wind-line wind-3"></div>
            <div class="wind-line wind-4"></div>
            <div class="wind-line wind-5"></div>
        </div>

        <!-- Подпись -->
        <div class="footer-credit">создал Акрапович Михаил Саныч</div>
    </div>

    <script src="script.js"></script>
    <script>
        function changeTheme(color) {
            const app = document.getElementById('app');
            app.className = 'telegram-app';
            app.classList.add('theme-' + color);
            localStorage.setItem('theme', color);
        }
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.getElementById('app').classList.add('theme-' + savedTheme);
            }
        });
    </script>
</body>
</html>
