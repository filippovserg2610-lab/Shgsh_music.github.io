<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ШГШ Музыка</title>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .telegram-app {
            max-width: 480px;
            width: 100%;
            min-height: 100vh;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ===== ШАПКА ===== */
        .tg-header {
            background: #1a1a2e;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a4a;
            position: sticky;
            top: 0;
            z-index: 10;
            min-height: 52px;
        }

        .tg-header-title {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            flex: 1;
            text-align: center;
        }

        .tg-header-subtitle {
            font-size: 11px;
            color: #8888aa;
            text-align: center;
            margin-top: -2px;
        }

        /* ===== ПРОФИЛЬ ===== */
        .tg-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 12px;
            border-bottom: 1px solid #1a1a2e;
            position: relative;
            z-index: 2;
        }

        .tg-profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #6c5ce7;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .tg-profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .tg-profile-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .tg-profile-bio {
            font-size: 14px;
            color: #8888aa;
            text-align: center;
            line-height: 1.4;
            max-width: 320px;
        }

        /* ===== ОКЕАН И ПЛОТ ===== */
        .ocean-scene {
            position: relative;
            width: 100%;
            height: 280px;
            margin-top: 10px;
            overflow: hidden;
            background: linear-gradient(180deg, #0a0e1a 0%, #0f1a2e 30%, #162a44 60%, #1a3a5a 80%, #0f1a2e 100%);
            border-top: 1px solid #2a4a6a;
            border-bottom: 1px solid #2a4a6a;
        }

        /* ===== ВОЛНЫ ===== */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 50px,
                rgba(30, 144, 255, 0.05) 50px,
                rgba(30, 144, 255, 0.05) 80px
            );
            animation: waveMove 8s linear infinite;
            opacity: 0.3;
        }

        .wave:nth-child(1) {
            background: radial-gradient(ellipse at 20% 100%, rgba(30, 144, 255, 0.15) 0%, transparent 50%);
            animation-duration: 6s;
            opacity: 0.4;
            bottom: -10px;
        }

        .wave:nth-child(2) {
            background: radial-gradient(ellipse at 60% 100%, rgba(70, 130, 255, 0.12) 0%, transparent 60%);
            animation-duration: 9s;
            opacity: 0.3;
            bottom: -5px;
        }

        .wave:nth-child(3) {
            background: radial-gradient(ellipse at 80% 100%, rgba(100, 180, 255, 0.08) 0%, transparent 50%);
            animation-duration: 7s;
            opacity: 0.2;
            bottom: 0px;
        }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ===== ПЛОТ ===== */
        .raft-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 120px;
            animation: raftRock 3s ease-in-out infinite;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        @keyframes raftRock {
            0% { transform: translateX(-50%) rotate(-2deg); }
            50% { transform: translateX(-50%) rotate(4deg); }
            100% { transform: translateX(-50%) rotate(-2deg); }
        }

        /* Рисуем плот */
        .raft {
            position: relative;
            width: 180px;
            height: 28px;
            background: linear-gradient(180deg, #8B6B4D, #6B4F3A);
            border-radius: 4px 4px 12px 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), inset 0 2px 0 rgba(255, 220, 180, 0.3);
            border: 1px solid #5a3f2a;
        }

        /* Брёвна на плоту */
        .raft::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 8px;
            right: 8px;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #7a5a3a 0px,
                #7a5a3a 20px,
                #5a3f2a 20px,
                #5a3f2a 22px,
                #7a5a3a 22px,
                #7a5a3a 42px,
                #5a3f2a 42px,
                #5a3f2a 44px,
                #7a5a3a 44px,
                #7a5a3a 64px,
                #5a3f2a 64px,
                #5a3f2a 66px,
                #7a5a3a 66px
            );
            border-radius: 4px;
            opacity: 0.6;
        }

        /* Края плота (канаты) */
        .raft::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -6px;
            right: -6px;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #8a7a5a 0px,
                #8a7a5a 8px,
                transparent 8px,
                transparent 12px,
                #8a7a5a 12px,
                #8a7a5a 20px,
                transparent 20px,
                transparent 24px,
                #8a7a5a 24px
            );
            border-radius: 2px;
            opacity: 0.4;
        }

        /* Бортики плота */
        .raft-rail {
            position: absolute;
            top: -8px;
            left: 10px;
            right: 10px;
            height: 8px;
            background: linear-gradient(180deg, #9a7a5a, #7a5a3a);
            border-radius: 8px 8px 0 0;
            opacity: 0.3;
        }

        /* КНОПКА НА ПЛОТУ */
        .raft-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 50px;
            color: #fff;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.3);
            position: relative;
            margin-bottom: 8px;
            letter-spacing: 1px;
            z-index: 10;
            animation: btnGlow 2s ease-in-out infinite;
        }

        @keyframes btnGlow {
            0% {
                box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 60px rgba(108, 92, 231, 0.9), 0 0 120px rgba(108, 92, 231, 0.4);
                transform: scale(1.05);
            }
            100% {
                box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
                transform: scale(1);
            }
        }

        .raft-btn::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.2), rgba(162, 155, 254, 0.1));
            filter: blur(10px);
            z-index: -1;
            animation: btnPulse 2s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; transform: scale(1); }
        }

        .raft-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.5);
        }

        /* ===== КОНТЕНТ ===== */
        .tg-content {
            flex: 1;
            padding: 12px 16px 100px;
            overflow-y: auto;
            position: relative;
            z-index: 2;
        }

        .tg-message {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2a4a;
        }

        .tg-message-text {
            font-size: 15px;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .tg-message-text strong {
            color: #fff;
        }

        .tg-footer {
            padding: 16px;
            text-align: center;
            border-top: 1px solid #1a1a2e;
            margin-top: 8px;
            position: relative;
            z-index: 2;
        }

        .tg-footer-text {
            font-size: 12px;
            color: #555577;
            line-height: 1.4;
        }

        .tg-footer-link {
            font-size: 12px;
            color: #6c5ce7;
            cursor: pointer;
            margin-top: 2px;
        }

        .tg-footer-link:hover {
            text-decoration: underline;
        }

        /* ===== ЗВЁЗДЫ НА НЕБЕ ===== */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .star:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .star:nth-child(2) { top: 20%; left: 30%; animation-delay: 0.5s; width: 3px; height: 3px; }
        .star:nth-child(3) { top: 5%; left: 50%; animation-delay: 1s; }
        .star:nth-child(4) { top: 15%; left: 70%; animation-delay: 1.5s; width: 3px; height: 3px; }
        .star:nth-child(5) { top: 25%; left: 85%; animation-delay: 2s; }
        .star:nth-child(6) { top: 8%; left: 20%; animation-delay: 0.8s; }
        .star:nth-child(7) { top: 18%; left: 60%; animation-delay: 1.2s; width: 4px; height: 4px; }
        .star:nth-child(8) { top: 28%; left: 40%; animation-delay: 0.3s; }
        .star:nth-child(9) { top: 12%; left: 80%; animation-delay: 1.8s; }
        .star:nth-child(10) { top: 22%; left: 15%; animation-delay: 2.2s; width: 3px; height: 3px; }

        /* ===== МЕЛКИЕ ВОЛНЫ (пена) ===== */
        .foam {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 200%;
            height: 20px;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.03) 0px,
                rgba(255, 255, 255, 0.03) 30px,
                transparent 30px,
                transparent 60px
            );
            animation: waveMove 12s linear infinite;
            opacity: 0.3;
            z-index: 1;
            border-radius: 50%;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 480px) {
            .telegram-app { max-width: 100%; }
            .ocean-scene { height: 220px; }
            .raft-container { width: 160px; height: 100px; bottom: 30px; }
            .raft { width: 140px; height: 24px; }
            .raft-btn { padding: 12px 20px; font-size: 16px; }
        }

        @media (max-width: 360px) {
            .ocean-scene { height: 180px; }
            .raft-container { width: 130px; height: 80px; bottom: 20px; }
            .raft { width: 120px; height: 20px; }
            .raft-btn { padding: 10px 16px; font-size: 14px; }
            .tg-profile-avatar { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <div class="telegram-app">

        <!-- ШАПКА -->
        <div class="tg-header">
            <div class="tg-header-title">🎵 ШГШ песни</div>
            <div class="tg-header-subtitle">remake</div>

        <div class="tg-profile">

            </div>
            <div class="tg-profile-name">@Music_shgshbot</div>

        <!-- ОКЕАН С ПЛОТОМ -->
        <div class="ocean-scene">

            <!-- Звёзды -->
            <div class="stars">
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
            </div>

            <!-- Волны -->
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="foam"></div>

            <!-- Плот с кнопкой -->
            <div class="raft-container">
                <button class="raft-btn" onclick="window.location.href='seasons.html'">▶️ СТАРТ</button>

        </div>

        <!-- ПРИВЕТСТВИЕ -->
        <div class="tg-content">

                    Здесь ты найдёшь все треки из сезонов,<br>ремиксы и оригиналы
                </div>

        <!-- ФУТЕР -->
        <div class="tg-footer">

    </div>
</body>
