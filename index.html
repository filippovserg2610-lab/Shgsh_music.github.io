<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ШГШ Музыка</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="telegram-app">
        <!-- Шапка -->
        <div class="tg-header">
            <div class="tg-header-title">ШГШ песни</div>
            <div class="tg-header-subtitle">remake</div>
        </div>

        <!-- Профиль бота -->
        <div class="tg-profile">
            <div class="tg-profile-avatar">
                <img src="avatar.png" alt="avatar" />
            </div>
            <div class="tg-profile-name">@Music_shgshbot</div>
            <div class="tg-profile-bio">
                Бот по музыке ШГШ (школа глазами школьника) | создан фанатом!
            </div>
        </div>

        <!-- Кнопки под профилем -->
        <div class="tg-profile-buttons">
            <button class="tg-profile-btn" onclick="window.location.href='seasons.html'">🎵 Открыть</button>
        </div>

        <!-- Контент -->
        <div class="tg-content">
            <!-- Приветствие как сообщение -->
            <div class="tg-message">
                <div class="tg-message-text">
                    🎧 <strong>Добро пожаловать в музыкальный бот ШГШ!</strong>
                </div>
                <div class="tg-message-text" style="margin-top: 6px; opacity: 0.8;">
                    Здесь ты найдёшь все треки из сезонов,<br>ремиксы и оригиналы
                </div>
            </div>

            <!-- Кнопка СТАРТ -->
            <div class="tg-reply-markup">
                <button class="tg-btn-start" onclick="window.location.href='seasons.html'">▶️ СТАРТ</button>
            </div>
        </div>

        <!-- Инфо внизу -->
        <div class="tg-footer">
            <div class="tg-footer-text">Размещая это мини-приложение, Вы принимаете</div>
            <div class="tg-footer-link">Пользовательское соглашение Telegram для разработчиков</div>
        </div>
    </div>
</body>
</html>
