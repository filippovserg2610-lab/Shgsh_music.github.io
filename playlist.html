    <title>Плейлист</title>
    <link rel="stylesheet" href="styles.css" />

<body>
    <div class="telegram-app">
        <div class="tg-header">
            <button class="tg-back-btn" onclick="window.location.href='seasons.html'">‹</button>
            <div class="tg-header-title" id="seasonTitle">🎵 СЕЗОН</div>
            <div style="width: 40px;"></div>

    </div>

    <!-- Аудиоплеер -->
    <div class="tg-player" id="playerBar" style="display:none;">
        <button class="tg-player-btn" id="playPauseBtn">▶️</button>
        <div class="tg-player-info">
            <div class="tg-player-title" id="currentSongName">Название</div>
            <div class="tg-player-subtitle" id="currentSeasonName">Сезон</div>
        </div>
        <input type="range" id="progressBar" min="0" max="100" value="0" style="flex:1; accent-color:#6c5ce7;" />
        <span id="timeDisplay" style="font-size:12px; color:#8888aa; min-width:40px;">0:00</span>
        <button class="tg-player-btn" onclick="downloadCurrentSong()">⬇️</button>
    </div>

    <script>

                    "Ни с одной", "SHRAMY", "Тени от пальм", "Не я", "Нуар", "Лампочки",

                    "Полудница - Гадкий утёнок", "УГАДАЙКТО - Suck My Balls", "Юлия Новоселова",
                    "Праздник", "SAWCE", "Школа не нужна", "Зачемгород"
                ]
            },
            "7": {

                folder: "7_season",
                dev: false,
                songs: [
                    "Only time", "Cyberpunkz", "Shouldve Been Me", "Axilla", "Amor Nostalgico",
                    "Cant Be There", "Sweep the Leg", "AKA, ШГШ - ОДНО И ТОЖЕ", "David Celeste - Ad Meliora",
                    "PWR", "Poluta", "Shitty train", "Before Its Gone", "Anyway", "Edgar Hopp",

                    "Шгш - Зодиак", "Дерзкий - Лайтово", "Милкис - Аирдроп", "Шгш - Принц на белом коне",
                    "Шгш - на люстрі", "Шгш - Хрущевка", "Шгш - Маленький принц", "Шгш - Пустой вокзал"
                ]
            },
            "6": {
                name: "🎹 6 СЕЗОН",
                folder: "6_season",
                dev: false,
                songs: [
                    "Мужа дома нету", "Peter Sandberg", "Jakob ahlbom", "SLAMJAKE - BZNS",
                    "Echo Sax End", "Panic Attack", "Шгш - Полина", "Шгш - Цензура", "Шгш - Маля",
                    "Another God", "Шгш, Ксюша - на ночевке", "Candelion_Press", "Шгш - ШГШ",
                    "Шгш - Легендарный", "Шгш - Наколки", "Шгш - Не переживай", "Шгш - Последняя победа",
                    "Шгш - Я никогда не буду работать", "Шгш - Последняя любовь"
                ]
            },
            "5": {

                folder: "5_season",
                dev: false,
                songs: [
                    "Шгш - Мы рядом", "Mothers Madness", "Sven Karlsson", "Def Lev",
                    "Шгш - я, Дерзкий твой", "Шгш - школа будет долгой", "Шгш - и это прекрасно"
                ]
            },
            "4": {

                folder: "4_season",
                dev: false,
                songs: [
                    "Elliot Holmes", "Дерз, ШГШ - Я дерзкий", "Choking Feat Red", "Shiver Disk - Chase Me",
                    "Confidence Is Key", "Im a Hurricane", "Manhattan Mystery", "Rocket JR",
                    "Шгш - Забросили учёбу", "Шгш - преданный класс А сезон", "Шгш - АнжГерКам",
                    "Шгш - Последний звонок", "Шгш - Сколько с тобой", "Шгш - Беда дисс",
                    "Duke Herrington", "Rockin_For_Decades1", "Got Something Going", "Go Cat Go",
                    "Harry Edvino", "Stickin' Around", "Back to My Roots", "Ludvig Moulim",
                    "Peter Crosby", "Purple Guy Song", "Bring It Back", "Strange Roll",
                    "Hiding in the Dark", "Palace Dinner", "More Than You", "Drunken Sailor",
                    "Love on a Roll", "max_anson", "Rockin_For_Decades2", "Mike Franklyn",
                    "Safe Trips", "Cleo_Kelley_Wrong_", "Left for Dead", "Pursuing",
                    "Roof_Don_t_Care", "Leave Sadness", "The Whole Nine", "Hiding Out",
                    "Magnetic Kid", "Джаро & Ханза", "Red Revision", "At Stake", "Of Men",
                    "Bottom Of My", "Smartface", "Elijah N", "8-Bit Hop", "The Times We",
                    "Rids", "Chasing the Truth", "It Was Newer", "I Dare You Dear",
                    "T. Morri", "Play It Cool", "Epocha", "Tick Tock Boom", "Tricks",
                    "Closer to the Light", "_Teya", "The Hardest", "Skip a Chance",
                    "Coming Through", "A Shadow on Wigmore", "My Left Foot", "Moorland"
                ]
            },
            "3": {
                name: "⏳ 3 СЕЗОН",
                folder: "3_season",
                dev: true,
                songs: ["🚧 В РАЗРАБОТКЕ"]
            },
            "2": {
                name: "⏳ 2 СЕЗОН",
                folder: "2_season",
                dev: true,
                songs: ["🚧 В РАЗРАБОТКЕ"]
            },
            "1": {
                name: "⏳ 1 СЕЗОН",
                folder: "1_season",
                dev: true,
                songs: ["🚧 В РАЗРАБОТКЕ"]
            },
            "0": {
                name: "🎙️ РЕМИКСЫ",
                folder: "0_season",
                dev: false,
                songs: [
                    "Шгш, ремикс - маленький принц",
                    "Шгш, ремикс - лайтово",
                    "Шгш, ремикс - последняя любовь",
                    "Шгш, ремикс - наколки"
                ]
            },
            "temp": {
                name: "🔄 ВРЕМЕННЫЕ ОРИГИНАЛЫ",
                folder: "temp_originals",
                dev: false,
                temp: true,
                songs: [
                    "🔜 Скоро здесь появятся оригиналы песен из серий ШГШ",
                    "⚡ Следите за обновлениями!"
                ]
            }
        };

        // ========== ПОЛУЧАЕМ СЕЗОН ==========
        const params = new URLSearchParams(window.location.search);
        const seasonId = params.get('season') || '8';
        const season = SEASONS[seasonId];
        const songs = season ? season.songs : [];
        const seasonName = season ? season.name : 'СЕЗОН';
        document.getElementById('seasonTitle').textContent = seasonName;
        const songList = document.getElementById('songList');

        // ========== ПЛЕЕР ==========
        const playerBar = document.getElementById('playerBar');
        const audioPlayer = document.getElementById('audioPlayer') || document.createElement('audio');
        audioPlayer.id = 'audioPlayer';
        audioPlayer.style.display = 'none';
        document.body.appendChild(audioPlayer);

        const playPauseBtn = document.getElementById('playPauseBtn');
        const currentSongName = document.getElementById('currentSongName');
        const currentSeasonName = document.getElementById('currentSeasonName');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');

        let currentSong = null;
        let currentSongFile = null;
        let isUserSeeking = false;

        // ========== УЛУЧШЕННЫЙ ПОИСК ФАЙЛА ==========
        async function findAudioFile(seasonFolder, songName) {
            const folder = `music/${seasonFolder}/`;
            
            // ВСЕ ВОЗМОЖНЫЕ ВАРИАНТЫ НАЗВАНИЙ
            const variants = [
                songName,                                                    // оригинал
                songName.replace(/[^\wа-яА-ЯёЁ\s\-]/g, '').trim(),          // без спецсимволов
                songName.replace(/[^\wа-яА-ЯёЁ]/g, '').trim(),              // только буквы и цифры
                songName.toLowerCase(),                                      // нижний регистр
                songName.replace(/\s+/g, '_'),                               // пробел → _
                songName.replace(/\s+/g, '-'),                               // пробел → -
                songName.replace(/,/g, ''),                                  // без запятых
                songName.replace(/['"`]/g, ''),                              // без кавычек
                songName.replace(/[()]/g, ''),                               // без скобок
            ];
            
            // Убираем дубликаты и пустые строки
            const uniqueVariants = [...new Set(variants.filter(v => v.length > 0))];
            
            // ВСЕ ФОРМАТЫ
            const formats = ['.mp3', '.m4a', '.ogg', '.wav', '.aac'];
            
            // Сначала ищем точное совпадение
            for (const name of uniqueVariants) {
                for (const format of formats) {
                    const path = `${folder}${encodeURIComponent(name)}${format}`;
                    try {
                        const response = await fetch(path, { method: 'HEAD' });
                        if (response.ok) {
                            return path;
                        }
                    } catch(e) {}
                }
            }
            
            // Если не нашли — пробуем искать по частям (для названий с дефисом или запятой)
            const separators = [' - ', ', ', ' – ', '—'];
            for (const sep of separators) {
                if (songName.includes(sep)) {
                    const parts = songName.split(sep).map(p => p.trim());
                    for (const part of parts) {
                        if (part.length > 2) {
                            const result = await findAudioFile(seasonFolder, part);
                            if (result) return result;
                        }
                    }
                }
            }
            
            return null;
        }

        // ========== ПОСТРОЕНИЕ СПИСКА ПЕСЕН ==========
        if (season && season.dev) {
            songList.innerHTML = `
                <div class="tg-message">
                    <div class="tg-message-text" style="text-align:center; padding: 30px 0;">
                        🚧 Этот сезон в разработке<br>🎵 Появится позже!
                    </div>
                </div>
                <div class="tg-reply-markup">
                    <button class="tg-btn-start" onclick="window.location.href='seasons.html'">🔙 НАЗАД</button>
                </div>
            `;
        } else {
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'tg-song-item';
                item.innerHTML = `
                    <div class="tg-song-name">🎵 ${song}</div>
                    <div class="tg-song-actions">
                        <button class="tg-btn-inline-small" onclick="playSong('${seasonId}', ${index})">▶️ Слушать</button>
                        <button class="tg-btn-inline-small" onclick="downloadSong('${seasonId}', ${index})">⬇️</button>
                    </div>
                `;
                songList.appendChild(item);
            });
        }

        // ========== ВОСПРОИЗВЕДЕНИЕ ==========
        async function playSong(seasonId, index) {
            const season = SEASONS[seasonId];
            const song = season.songs[index];
            const folder = season.folder;
            const songPath = await findAudioFile(folder, song);

            currentSong = song;
            currentSongFile = songPath;
            currentSongName.textContent = song;
            currentSeasonName.textContent = season.name;

            if (songPath) {
                audioPlayer.src = songPath;
                audioPlayer.load();
                
                audioPlayer.addEventListener('loadedmetadata', function() {
                    audioPlayer.play().catch(e => {
                        alert(`⚠️ Не удалось воспроизвести: ${song}\nПопробуйте скачать.`);
                    });
                }, { once: true });
                
                setTimeout(() => {
                    if (audioPlayer.paused && audioPlayer.src) {
                        audioPlayer.play().catch(() => {});
                    }
                }, 3000);
                
                playerBar.style.display = 'flex';
                playPauseBtn.textContent = '⏸️';
            } else {
                alert(`⚠️ Файл не найден: ${song}\n\nПоложите файл в music/${folder}/\n\nПоддерживаются: MP3, M4A, OGG, WAV, AAC`);
            }
        }

        // ========== СКАЧИВАНИЕ ==========
        function downloadSong(seasonId, index) {
            const season = SEASONS[seasonId];
            const song = season.songs[index];
            const folder = season.folder;
            
            const formats = ['.mp3', '.m4a', '.ogg', '.wav'];
            for (const format of formats) {
                const link = document.createElement('a');
                link.href = `music/${folder}/${encodeURIComponent(song)}${format}`;
                link.download = `${song}${format}`;
                link.click();
            }
        }

        function downloadCurrentSong() {
            if (currentSongFile) {
                const link = document.createElement('a');
                link.href = currentSongFile;
                link.download = currentSongFile.split('/').pop();
                link.click();
            }
        }

        // ========== УПРАВЛЕНИЕ ПЛЕЕРОМ ==========
        audioPlayer.addEventListener('play', () => playPauseBtn.textContent = '⏸️');
        audioPlayer.addEventListener('pause', () => playPauseBtn.textContent = '▶️');
        audioPlayer.addEventListener('ended', () => {
            progressBar.value = 0;
            timeDisplay.textContent = '0:00';
            playPauseBtn.textContent = '▶️';
        });

        playPauseBtn.addEventListener('click', () => {
            if (audioPlayer.paused) audioPlayer.play();
            else audioPlayer.pause();
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (!isUserSeeking && audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.value = percent;
                const minutes = Math.floor(audioPlayer.currentTime / 60);
                const seconds = Math.floor(audioPlayer.currentTime % 60);
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        });

        progressBar.addEventListener('input', (e) => {
            isUserSeeking = true;
            if (audioPlayer.duration) {
                const time = (e.target.value / 100) * audioPlayer.duration;
                audioPlayer.currentTime = time;
                const minutes = Math.floor(time / 60);
                const seconds = Math.floor(time % 60);
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        });
        progressBar.addEventListener('change', () => isUserSeeking = false);
    </script>
</body>
</html>
